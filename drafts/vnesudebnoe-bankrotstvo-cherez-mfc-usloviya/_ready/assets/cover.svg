<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f5f7fa; }
      .text-main { font-family: Arial, sans-serif; font-size: 48px; font-weight: bold; fill: #0a0d12; }
      .text-meta { font-family: Arial, sans-serif; font-size: 24px; fill: #6b7280; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Geometric shapes -->
  <rect x="50" y="50" width="200" height="200" fill="#e0e7ff" opacity="0.6" rx="8"/>
  <circle cx="900" cy="150" r="100" fill="#dbeafe" opacity="0.5"/>
  <rect x="150" y="400" width="250" height="150" fill="#cffafe" opacity="0.4" rx="8"/>

  <!-- Main text -->
  <text x="600" y="200" class="text-main" text-anchor="middle">
